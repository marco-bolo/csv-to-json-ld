name: Precheck Foreign Keys

on:
  workflow_dispatch:

jobs:
  precheck:
    name: Run precheck.py on all CSVs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run precheck
        run: python pre-validate_scripts/precheck.py
